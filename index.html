<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body bg-light>
    <header>
      
    </header>
    <nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand mb-0 h1 ">Los Simpson API</span>
  </div>
</nav>

<div class="container">
  <div class="row mb-4">
    <div class="col-md-8 offset-md-2">
      <div class="input-group">
        <input type="text" id="input-busqueda" class="form-control" placeholder="Buscar personaje por nombre...">
        <button class="btn btn-warning" type="button" id="btn-buscar">Buscar</button>
      </div>
      <div id="mensaje-error" class="text-danger mt-2 d-none">No se encontraron resultados.</div>
    </div>
  </div>

  <div id="contenedor-personajes" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
  </div>
</div>



<!-- modal de detalle del personaje -->
<div class="modal fade" id="modalDetalle" tabindex="-1" aria-labelledby="modalDetalleLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalDetalleLabel"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        <img id="modal-imagen" src="" alt="" class="img-fluid mb-3" style="max-height: 250px; object-fit: contain;">
        <p><strong>Edad:</strong> <span id="modal-edad"></span></p>
        <p><strong>Fecha de nacimiento:</strong> <span id="modal-nacimiento"></span></p>
        <p><strong>Género:</strong> <span id="modal-genero"></span></p>
        <p><strong>Ocupación:</strong> <span id="modal-ocupacion"></span></p>
        <p><strong>Estado:</strong> <span id="modal-estado"></span></p>
        <p class="fst-italic mt-3" id="modal-frase"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-warning" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>


    <script src="assets/js/app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
